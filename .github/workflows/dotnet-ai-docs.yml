name: .NET AI Documentation (Feature Wise)

on:
  workflow_dispatch:

env:
  COMMIT_ID: ${{ vars.COMMIT_ID }}

jobs:
  build-and-docs:
    runs-on: ubuntu-latest

    steps:
      # ----------------------------------------
      # Checkout Repository
      # ----------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ----------------------------------------
      # Setup .NET
      # ----------------------------------------
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # ----------------------------------------
      # Restore & Build
      # ----------------------------------------
      - name: Restore dependencies
        run: dotnet restore

      - name: Build project
        run: dotnet build --configuration Release --no-restore

      # ----------------------------------------
      # Install jq
      # ----------------------------------------
      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      # ----------------------------------------
      # Generate AI Documentation
      # ----------------------------------------
      - name: Generate AI Documentation
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          echo "🔍 Determining commit..."

          PLACEHOLDER="your_commit_sha"
          INPUT_COMMIT="$COMMIT_ID"

          if [ -n "$INPUT_COMMIT" ] && [ "$INPUT_COMMIT" != "$PLACEHOLDER" ]; then
            echo "📌 Using commit from ENV: $INPUT_COMMIT"
            git checkout $INPUT_COMMIT

            CURRENT_COMMIT=$INPUT_COMMIT
            PREVIOUS_COMMIT=$(git rev-parse $INPUT_COMMIT^)
          else
            echo "📌 Using latest commit from branch"
            CURRENT_COMMIT=$(git rev-parse HEAD)
            PREVIOUS_COMMIT=$(git rev-parse HEAD^)
          fi

          echo "➡️ Previous: $PREVIOUS_COMMIT"
          echo "➡️ Current : $CURRENT_COMMIT"

          DIFF=$(git diff $PREVIOUS_COMMIT $CURRENT_COMMIT)
          COMMITS=$(git log $PREVIOUS_COMMIT..$CURRENT_COMMIT --pretty=format:"%s")

          # 🔥 Filter workflow files
          DIFF=$(echo "$DIFF" | grep -v ".github/workflows" | head -n 150)

          if [ -z "$DIFF" ]; then
            DIFF="No application code changes"
          fi

          echo "🤖 Preparing prompt..."

          PROMPT=$(printf "%s\n" \
            "You are a senior .NET architect." \
            "" \
            "Analyze ONLY the provided code diff." \
            "" \
            "STRICT RULES:" \
            "- If only CI/CD or workflow files changed → say 'No application-level changes detected'" \
            "- If no meaningful code → say 'No new features identified from diff'" \
            "- DO NOT generate generic explanations" \
            "- DO NOT guess anything" \
            "- If unclear → say 'Insufficient data'" \
            "" \
            "OUTPUT FORMAT:" \
            "## 🚀 Features Implemented" \
            "## 🐛 Bug Fixes" \
            "## 📂 Affected Modules / Layers" \
            "## 🔧 Technical Changes (Detailed)" \
            "## ⚡ Impact"
          )

          INPUT=$(printf "%s\n\nCommits:\n%s\n\nCode Diff:\n%s" "$PROMPT" "$COMMITS" "$DIFF")

          PAYLOAD=$(jq -n \
            --arg model "llama-3.3-70b-versatile" \
            --arg content "$INPUT" \
            '{
              model: $model,
              messages: [
                { role: "user", content: $content }
              ]
            }')

          echo "🚀 Calling Groq API..."

          RESPONSE=$(curl -s https://api.groq.com/openai/v1/chat/completions \
            -H "Authorization: Bearer $GROQ_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          echo "📦 Raw API Response:"
          echo "$RESPONSE"

          DOC=$(echo "$RESPONSE" | jq -r '
            if .error then
              "ERROR: " + (.error.message // "Unknown error")
            elif .choices and .choices[0].message.content then
              .choices[0].message.content
            else
              empty
            end
          ')

          if [ -z "$DOC" ] || [ "$DOC" = "null" ]; then
            DOC="## ⚠️ AI Output Failed\nNo meaningful documentation generated."
          fi

          echo "📄 Preparing documentation file..."

          mkdir -p docs

          CURRENT_TIME=$(date "+%Y-%m-%d %H:%M:%S")

          # 🔥 Detect branch name
          BRANCH_NAME=$(git rev-parse --abbrev-ref HEAD)
          if [ "$BRANCH_NAME" = "HEAD" ]; then
            BRANCH_NAME=${GITHUB_REF#refs/heads/}
          fi

          echo "📌 Branch Name: $BRANCH_NAME"

          # 🔥 Convert branch name to file name
          SAFE_NAME=$(echo "$BRANCH_NAME" | sed 's/\//-/g')

          FILE_PATH="docs/${SAFE_NAME}.md"

          echo "📄 Creating file: $FILE_PATH"

          # 🔥 Write file
          echo "## 📅 Feature Release ($BRANCH_NAME) - $CURRENT_TIME" > $FILE_PATH
          echo "" >> $FILE_PATH
          echo "$DOC" >> $FILE_PATH
          echo "" >> $FILE_PATH

      # ----------------------------------------
      # Commit & Push
      # ----------------------------------------
      - name: Commit documentation
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add docs/

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: auto generate feature-wise documentation (.NET AI)"

          BRANCH_NAME=$(git rev-parse --abbrev-ref HEAD)

          if [ "$BRANCH_NAME" = "HEAD" ]; then
            BRANCH_NAME=${GITHUB_REF#refs/heads/}
          fi

          echo "🚀 Pushing to branch: $BRANCH_NAME"

          git push origin HEAD:$BRANCH_NAME --force
