name: .NET AI Documentation (Feature Wise)

on:
  workflow_dispatch:

jobs:
  build-and-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build project
        run: dotnet build --configuration Release --no-restore

      - name: Run tests (optional)
        run: dotnet test --no-build --verbosity normal || true

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Generate AI Documentation
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          echo "Extracting Git diff..."

          PARENTS=$(git log -1 --pretty=%P)
          P1=$(echo $PARENTS | cut -d ' ' -f1)
          P2=$(echo $PARENTS | cut -d ' ' -f2)

          if [ -n "$P2" ]; then
            DIFF=$(git diff $P1 $P2)
            COMMITS=$(git log $P1..$P2 --pretty=format:"%s")
          else
            DIFF=$(git show HEAD)
            COMMITS=$(git log -1 --pretty=format:"%s")
          fi

          DIFF=$(echo "$DIFF" | head -n 300)

          if [ -z "$DIFF" ]; then
            DIFF="No code changes detected"
          fi

          echo "Preparing prompt..."

          PROMPT=$(printf "%s\n" \
            "You are a senior .NET architect and software engineer." \
            "" \
            "Generate FINAL FEATURE-WISE TECHNICAL DOCUMENTATION based ONLY on the provided code diff." \
            "" \
            "STRICT RULES:" \
            "- Do NOT hallucinate" \
            "- Only use visible diff data" \
            "- If unclear say Insufficient data" \
            "- No commit-wise output" \
            "" \
            "OUTPUT FORMAT:" \
            "Features Implemented" \
            "Bug Fixes" \
            "Affected Modules / Layers" \
            "Technical Changes (Detailed)" \
            "Impact"
          )

          INPUT=$(printf "%s\n\nContext:\n%s\n\nCode Diff:\n%s" "$PROMPT" "$COMMITS" "$DIFF")

          PAYLOAD=$(jq -n \
            --arg model "llama-3.3-70b-versatile" \
            --arg input "$INPUT" \
            '{ model: $model, input: $input }')

          echo "Calling Groq API..."

          RESPONSE=$(curl -s https://api.groq.com/openai/v1/responses \
            -H "Authorization: Bearer $GROQ_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          echo "$RESPONSE"

          DOC=$(echo "$RESPONSE" | jq -r '
            if .output_text then .output_text
            elif .output and .output[0].content and .output[0].content[0].text then .output[0].content[0].text
            else empty end
          ')

          if [ -z "$DOC" ] || [ "$DOC" = "null" ]; then
            DOC="AI Output Failed"
          fi

          mkdir -p docs
          FILE=docs/auto-generated.md

          DATE=$(date "+%Y-%m-%d %H:%M:%S")

          echo "" >> $FILE
          echo "## Feature Release - $DATE" >> $FILE
          echo "" >> $FILE
          echo "$DOC" >> $FILE
          echo "" >> $FILE
          echo "---" >> $FILE

      - name: Commit documentation
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add docs/auto-generated.md

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "chore: auto generate documentation"
          git push
