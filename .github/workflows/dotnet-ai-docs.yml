name: .NET AI Documentation (Feature Wise)

on:
  workflow_dispatch:

jobs:
  build-and-docs:
    runs-on: ubuntu-latest

    steps:
    # ----------------------------------------
    # Checkout
    # ----------------------------------------
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # ----------------------------------------
    # Setup .NET
    # ----------------------------------------
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    # ----------------------------------------
    # Restore & Build
    # ----------------------------------------
    - name: Restore dependencies
      run: dotnet restore

    - name: Build project
      run: dotnet build --configuration Release --no-restore

    - name: Run Tests (Optional)
      run: dotnet test --no-build --verbosity normal || true

    # ----------------------------------------
    # Install jq (for JSON parsing)
    # ----------------------------------------
    - name: Install jq
      run: sudo apt-get update && sudo apt-get install -y jq

    # ----------------------------------------
    # Generate Feature-wise Documentation
    # ----------------------------------------
    - name: Generate AI Documentation (Feature Wise Only)
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        AI_PROMPT: |
          You are a senior .NET architect and software engineer.

          Your task is to generate FINAL FEATURE-WISE TECHNICAL DOCUMENTATION based ONLY on the provided code diff.

          STRICT RULES:
          - DO NOT hallucinate or assume features
          - ONLY document what is clearly visible in the code diff
          - If data is insufficient → explicitly mention "Insufficient data"
          - DO NOT show commit-wise information
          - Group changes into FEATURES and BUG FIXES logically
          - If nothing meaningful → return empty sections
          - If files are deleted → mention removal

          ANALYSIS INSTRUCTIONS:
          - Identify Controllers, Services, Repositories, DTOs, Entities
          - Detect API changes (new endpoints, modified endpoints)
          - Detect business logic changes
          - Detect DB/schema changes (migrations, models)
          - Detect performance improvements or refactoring

          OUTPUT FORMAT:

          ## 🚀 Features Implemented
          - Only include clearly identifiable features
          - If none → "No new features identified from diff"

          ## 🐛 Bug Fixes
          - Only include confirmed fixes
          - If none → "No bug fixes identified"

          ## 📂 Affected Modules / Layers
          - List only actual impacted layers
          (e.g., Controllers, Services, Repositories, Database, DTOs)

          ## 🔧 Technical Changes (Detailed)
          - Explain exact code-level changes
          - No assumptions
          - If unclear → "Insufficient data"

          ## ⚡ Impact
          - Only if logically derivable
          - Otherwise → "Impact cannot be determined from available diff"

      run: |
        echo "🔍 Extracting PR data..."

        PARENTS=$(git log -1 --pretty=%P)
        PARENT1=$(echo $PARENTS | cut -d ' ' -f1)
        PARENT2=$(echo $PARENTS | cut -d ' ' -f2)

        if [ -n "$PARENT2" ]; then
          echo "🔀 Merge commit detected"

          DIFF=$(git diff $PARENT1 $PARENT2)
          COMMITS=$(git log $PARENT1..$PARENT2 --pretty=format:"%s")
        else
          echo "📌 Normal commit"

          DIFF=$(git show HEAD)
          COMMITS=$(git log -1 --pretty=format:"%s")
        fi

        # Limit size (important for API)
        DIFF=$(echo "$DIFF" | head -c 12000)

        echo "🤖 Preparing AI request..."

        PAYLOAD=$(jq -n \
          --arg prompt "$AI_PROMPT" \
          --arg commits "$COMMITS" \
          --arg diff "$DIFF" \
          '{
            model: "openai/gpt-oss-20b",
            input: ($prompt + "\n\nContext (Do NOT display):\n" + $commits + "\n\nCode Diff:\n" + $diff)
          }')

        echo "🚀 Calling Groq API..."

        RESPONSE=$(curl -s https://api.groq.com/openai/v1/responses \
          -H "Authorization: Bearer $GROQ_API_KEY" \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD")

        DOC=$(echo $RESPONSE | jq -r '.output[0].content[0].text // .output_text // empty')

        if [ -z "$DOC" ] || [ "$DOC" == "null" ]; then
          DOC="## ⚠️ AI Output Failed\nNo meaningful documentation generated."
        fi

        mkdir -p docs
        touch docs/auto-generated.md

        CURRENT_TIME=$(date "+%Y-%m-%d %H:%M:%S")

        echo "📄 Updating documentation..."

        {
          echo ""
          echo "## 📅 Feature Release - $CURRENT_TIME"
          echo ""
          echo "$DOC"
          echo ""
          echo "---"
        } >> docs/auto-generated.md

    # ----------------------------------------
    # Commit & Push
    # ----------------------------------------
    - name: Commit documentation
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"

        git add docs/auto-generated.md

        if git diff --cached --quiet; then
          echo "No changes to commit"
          exit 0
        fi

        git commit -m "Auto generate feature-wise documentation (.NET)"

        git push
